<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Піци - Крок 1</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Крок 1: Оберіть тип тіста</h1>
        <form method="POST" action="{{ url_for('step1') }}">
            <div class="options-grid">
{% for dough in doughs %}
                    <label class="option-card">
                        <input type="radio" name="dough" value="{{dough.id}}" required>
                        <div class="card-content">
                            <img src="{{url_for('static', filename=dough.image)}}" alt="{{dough.name}}" class="option-image">
                            <h3>{{dough.name}}</h3>
                            <p>{{dough.description}}</p>
                            <p class="price">${{dough.price}}</p>
                        </div>
                    </label>
{%endfor%}
            </div>
            <button type="submit" class="btn btn-primary">Далі</button>
        </form>
        <a href="/" class="btn btn-secondary">На головну</a>
    </div>
</body>
</html>
